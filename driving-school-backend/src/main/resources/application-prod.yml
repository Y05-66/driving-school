spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:driving_school}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      database: 0

jwt:
  # 生产环境必须通过环境变量 JWT_SECRET 设置密钥，禁止使用默认值
  secret: ${JWT_SECRET}
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

# CORS: 生产环境通过环境变量指定允许的域名，默认允许所有（部署时应限制为具体域名）
cors:
  allowed-origins: ${CORS_ORIGINS:*}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
